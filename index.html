<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>8M Residences — Sell or Rent?</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prop-types@15.8.1/prop-types.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/recharts@2.12.7/umd/Recharts.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-deep: #080c18;
      --bg-surface: #0f172a;
      --bg-card: #ffffff;
      --bg-card-inner: #f8fafc;
      --bg-elevated: #1e293b;
      --accent: #2dd4bf;
      --accent-dim: rgba(45, 212, 191, 0.15);
      --accent-glow: rgba(45, 212, 191, 0.08);
      --sell-color: #f97316;
      --sell-dim: rgba(249, 115, 22, 0.12);
      --rent-color: #2dd4bf;
      --rent-dim: rgba(45, 212, 191, 0.12);
      --positive: #22c55e;
      --negative: #ef4444;
      --text-primary: #0f172a;
      --text-secondary: #475569;
      --text-muted: #94a3b8;
      --text-light: #e2e8f0;
      --text-white: #f8fafc;
      --border: #e2e8f0;
      --border-subtle: #f1f5f9;
      --radius: 16px;
      --radius-sm: 10px;
      --radius-xs: 6px;
      --shadow-card: 0 1px 3px rgba(0,0,0,0.04), 0 4px 16px rgba(0,0,0,0.06);
      --shadow-elevated: 0 8px 32px rgba(0,0,0,0.12);
      --font-body: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-display: 'Instrument Serif', Georgia, serif;
      --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    html { font-size: 16px; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
    body { font-family: var(--font-body); background: var(--bg-deep); color: var(--text-primary); line-height: 1.5; min-height: 100vh; }

    /* Animated gradient background */
    .page-bg {
      min-height: 100vh;
      background:
        radial-gradient(ellipse 80% 60% at 50% 0%, rgba(45, 212, 191, 0.06) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(45, 212, 191, 0.03) 0%, transparent 50%),
        var(--bg-deep);
      padding: 1rem 1rem 2rem;
    }

    .container { max-width: 76rem; margin: 0 auto; }

    /* Typography */
    .title-display { font-family: var(--font-display); font-size: 2.5rem; color: var(--text-white); letter-spacing: -0.01em; line-height: 1.1; }
    .subtitle { font-size: 0.8125rem; color: var(--text-muted); font-weight: 400; letter-spacing: 0.02em; }

    /* Property badges */
    .badge-row { display: flex; flex-wrap: wrap; gap: 0.375rem; justify-content: center; margin-top: 0.75rem; }
    .badge { display: inline-flex; align-items: center; padding: 0.25rem 0.625rem; border-radius: 100px; background: var(--bg-elevated); color: var(--text-muted); font-size: 0.6875rem; font-weight: 500; letter-spacing: 0.03em; border: 1px solid rgba(255,255,255,0.06); }
    .badge-accent { background: var(--accent-dim); color: var(--accent); border-color: rgba(45, 212, 191, 0.15); }

    /* Tab navigation */
    .tab-nav { display: flex; gap: 0.25rem; justify-content: center; margin-bottom: 2rem; background: var(--bg-elevated); padding: 0.25rem; border-radius: 12px; width: fit-content; margin-left: auto; margin-right: auto; border: 1px solid rgba(255,255,255,0.06); }
    .tab-btn { padding: 0.625rem 1.5rem; font-weight: 600; font-size: 0.8125rem; border-radius: 10px; border: none; background: transparent; color: var(--text-muted); cursor: pointer; transition: var(--transition); font-family: var(--font-body); letter-spacing: 0.01em; white-space: nowrap; }
    .tab-btn:hover { color: var(--text-light); }
    .tab-btn.active { background: var(--accent); color: var(--bg-deep); box-shadow: 0 2px 8px rgba(45, 212, 191, 0.3); }

    /* Cards */
    .card { background: var(--bg-card); border-radius: var(--radius); padding: 1.5rem; box-shadow: var(--shadow-card); border: 1px solid var(--border-subtle); margin-bottom: 1rem; }
    .card-dark { background: var(--bg-surface); border: 1px solid rgba(255,255,255,0.06); box-shadow: none; }
    .card-title { font-size: 0.875rem; font-weight: 700; color: var(--text-primary); margin-bottom: 1rem; letter-spacing: -0.01em; text-transform: uppercase; letter-spacing: 0.06em; font-size: 0.6875rem; }
    .card-dark .card-title { color: var(--text-light); }
    .card-top-accent { border-top: 3px solid var(--accent); }
    .card-top-sell { border-top: 3px solid var(--sell-color); }

    /* Verdict */
    .verdict-card { background: var(--bg-surface); border: 1px solid rgba(255,255,255,0.08); border-radius: var(--radius); padding: 2rem 1.5rem; text-align: center; margin-bottom: 1.5rem; position: relative; overflow: hidden; }
    .verdict-card::before { content: ''; position: absolute; inset: 0; opacity: 0.04; pointer-events: none; }
    .verdict-card.sell::before { background: radial-gradient(ellipse at center, var(--sell-color), transparent 70%); }
    .verdict-card.rent::before { background: radial-gradient(ellipse at center, var(--rent-color), transparent 70%); }
    .verdict-card.close::before { background: radial-gradient(ellipse at center, #fbbf24, transparent 70%); }
    .verdict-label { font-size: 0.6875rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 0.5rem; }
    .verdict-recommendation { font-family: var(--font-display); font-size: 3rem; line-height: 1; margin-bottom: 0.75rem; }
    .verdict-reason { font-size: 0.875rem; color: var(--text-muted); max-width: 38rem; margin: 0 auto; line-height: 1.6; }
    .verdict-disclaimer { font-size: 0.6875rem; color: rgba(148, 163, 184, 0.6); margin-top: 1rem; font-style: italic; }

    /* Grid layouts */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }
    .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem 2rem; }

    /* Slider inputs */
    .slider-group { margin-bottom: 0; }
    .slider-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 0.375rem; }
    .slider-label { font-size: 0.8125rem; font-weight: 500; color: var(--text-secondary); }
    .slider-value { font-size: 0.9375rem; font-weight: 700; color: var(--text-primary); font-variant-numeric: tabular-nums; }
    .slider-range { display: flex; justify-content: space-between; margin-top: 0.25rem; }
    .slider-bound { font-size: 0.6875rem; color: var(--text-muted); }
    .slider-extra { text-align: center; font-size: 0.6875rem; color: var(--text-muted); margin-top: 0.125rem; }

    input[type="range"] {
      -webkit-appearance: none; appearance: none; width: 100%; height: 6px;
      background: var(--border); border-radius: 100px; outline: none; cursor: pointer;
      transition: var(--transition);
    }
    input[type="range"]:hover { background: #cbd5e1; }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none; width: 18px; height: 18px; border-radius: 50%;
      background: var(--accent); cursor: pointer; border: 3px solid white;
      box-shadow: 0 1px 4px rgba(0,0,0,0.15), 0 0 0 1px rgba(45, 212, 191, 0.2);
      transition: var(--transition);
    }
    input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.15); box-shadow: 0 2px 8px rgba(45, 212, 191, 0.4), 0 0 0 2px rgba(45, 212, 191, 0.15); }
    input[type="range"]::-moz-range-thumb {
      width: 18px; height: 18px; border-radius: 50%;
      background: var(--accent); cursor: pointer; border: 3px solid white;
      box-shadow: 0 1px 4px rgba(0,0,0,0.15), 0 0 0 1px rgba(45, 212, 191, 0.2);
    }

    /* Hero metrics */
    .hero-metric { text-align: center; padding: 1.25rem 1rem; background: var(--bg-card-inner); border-radius: var(--radius-sm); margin-bottom: 1rem; }
    .hero-metric-label { font-size: 0.75rem; font-weight: 500; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.25rem; }
    .hero-metric-value { font-size: 2rem; font-weight: 700; letter-spacing: -0.02em; line-height: 1.2; font-variant-numeric: tabular-nums; }
    .hero-metric-sub { font-size: 0.6875rem; color: var(--text-muted); margin-top: 0.25rem; }

    /* Metric rows */
    .metric-row { display: flex; justify-content: space-between; align-items: flex-start; padding: 0.625rem 0; border-bottom: 1px solid var(--border-subtle); }
    .metric-row:last-child { border-bottom: none; }
    .metric-label { font-size: 0.8125rem; color: var(--text-secondary); }
    .metric-sub { font-size: 0.6875rem; color: var(--text-muted); margin-top: 0.125rem; }
    .metric-value { font-size: 0.875rem; font-weight: 700; text-align: right; font-variant-numeric: tabular-nums; }

    /* Divider row */
    .divider-accent { margin-top: 0.75rem; padding-top: 0.75rem; border-top: 2px solid var(--accent); }
    .divider-sell { margin-top: 0.75rem; padding-top: 0.75rem; border-top: 2px solid var(--sell-color); }

    /* Projected returns sub-card */
    .projection-box { margin-top: 1rem; padding: 1rem; background: var(--bg-card-inner); border-radius: var(--radius-sm); }
    .projection-title { font-size: 0.8125rem; font-weight: 600; color: var(--text-secondary); margin-bottom: 0.5rem; }
    .projection-row { display: flex; justify-content: space-between; padding: 0.25rem 0; font-size: 0.8125rem; }
    .projection-year { color: var(--text-muted); }
    .projection-val { font-weight: 600; color: var(--text-primary); font-variant-numeric: tabular-nums; }

    /* Risk cards */
    .risk-item { display: flex; gap: 0.625rem; padding: 0.5rem 0; font-size: 0.8125rem; color: var(--text-secondary); line-height: 1.5; }
    .risk-icon { flex-shrink: 0; width: 1.25rem; height: 1.25rem; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.625rem; margin-top: 0.125rem; }
    .risk-icon-sell { background: var(--sell-dim); color: var(--sell-color); }
    .risk-icon-rent { background: var(--rent-dim); color: var(--rent-color); }

    /* Cash flow reality check */
    .cashflow-card { text-align: center; padding: 1.25rem 1rem; background: var(--bg-card-inner); border-radius: var(--radius-sm); }
    .cashflow-label { font-size: 0.75rem; font-weight: 500; color: var(--text-muted); margin-bottom: 0.375rem; }
    .cashflow-value { font-size: 1.375rem; font-weight: 700; font-variant-numeric: tabular-nums; }
    .cashflow-sub { font-size: 0.6875rem; color: var(--text-muted); margin-top: 0.25rem; }

    /* Scenario toggles */
    .scenario-toggle { padding: 1rem; border-radius: var(--radius-sm); border: 1px solid rgba(255,255,255,0.08); background: var(--bg-elevated); cursor: pointer; transition: var(--transition); }
    .scenario-toggle:hover { border-color: rgba(255,255,255,0.15); }
    .scenario-toggle.active { border-color: var(--accent); background: rgba(45, 212, 191, 0.06); }
    .scenario-label { font-size: 0.8125rem; font-weight: 600; color: var(--text-light); }
    .scenario-desc { font-size: 0.75rem; color: var(--text-muted); margin-top: 0.125rem; }
    .scenario-impact { margin-top: 0.5rem; padding: 0.5rem 0.75rem; border-radius: var(--radius-xs); background: var(--accent-dim); color: var(--accent); font-size: 0.75rem; line-height: 1.5; }

    /* Toggle switch */
    .toggle-track { width: 2.5rem; height: 1.375rem; border-radius: 100px; padding: 2px; transition: var(--transition); flex-shrink: 0; }
    .toggle-track.off { background: rgba(255,255,255,0.12); }
    .toggle-track.on { background: var(--accent); }
    .toggle-thumb { width: 1.125rem; height: 1.125rem; background: white; border-radius: 50%; box-shadow: 0 1px 2px rgba(0,0,0,0.2); transition: var(--transition); }
    .toggle-thumb.on { transform: translateX(1.125rem); }

    /* Adjusted appreciation box */
    .appreciation-box { margin-top: 1rem; padding: 0.75rem 1rem; background: var(--bg-elevated); border-radius: var(--radius-sm); border: 1px solid rgba(255,255,255,0.06); display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }
    .appreciation-label { font-size: 0.8125rem; font-weight: 600; color: var(--text-muted); }

    /* Market charts card */
    .chart-subtitle { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 1rem; line-height: 1.5; }
    .card-dark .chart-subtitle { color: rgba(148, 163, 184, 0.7); }

    /* Table */
    .data-table { width: 100%; border-collapse: collapse; font-size: 0.8125rem; }
    .data-table thead th { text-align: center; padding: 0.625rem 0.75rem; font-weight: 600; font-size: 0.6875rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); border-bottom: 2px solid var(--border); }
    .data-table thead th:first-child { text-align: left; }
    .data-table tbody td { padding: 0.625rem 0.75rem; text-align: center; border-bottom: 1px solid var(--border-subtle); }
    .data-table tbody td:first-child { text-align: left; font-weight: 500; }
    .data-table tbody tr:last-child td { border-bottom: none; }
    .data-table .highlight-row { background: var(--accent-dim); }
    .card-dark .data-table thead th { color: var(--text-muted); border-bottom-color: rgba(255,255,255,0.08); }
    .card-dark .data-table tbody td { border-bottom-color: rgba(255,255,255,0.06); color: var(--text-light); }
    .card-dark .data-table .highlight-row { background: rgba(45, 212, 191, 0.08); }

    /* Market assessment cards */
    .assessment-block { padding: 1rem; background: var(--bg-elevated); border-radius: var(--radius-sm); border: 1px solid rgba(255,255,255,0.06); }
    .assessment-title { font-size: 0.8125rem; font-weight: 700; color: var(--text-light); margin-bottom: 0.375rem; }
    .assessment-text { font-size: 0.8125rem; color: var(--text-muted); line-height: 1.6; }
    .assessment-text strong { color: var(--text-light); font-weight: 600; }

    /* Supply legend */
    .chart-legend { display: flex; gap: 1rem; justify-content: center; margin-top: 0.75rem; }
    .legend-item { display: flex; align-items: center; gap: 0.375rem; font-size: 0.6875rem; }
    .card-dark .legend-item { color: var(--text-muted); }
    .legend-dot { width: 0.625rem; height: 0.625rem; border-radius: 2px; display: inline-block; }

    /* Footer */
    .footer { text-align: center; padding: 2rem 0 1rem; }
    .footer-brand { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 0.5rem; }
    .footer-brand a { color: var(--accent); text-decoration: none; font-weight: 600; transition: var(--transition); }
    .footer-brand a:hover { color: #5eead4; }
    .footer-disclaimer { font-size: 0.6875rem; color: rgba(148, 163, 184, 0.5); line-height: 1.6; max-width: 32rem; margin: 0 auto; }

    /* Recharts tooltip override */
    .recharts-default-tooltip { background: var(--bg-card) !important; border: 1px solid var(--border) !important; border-radius: var(--radius-xs) !important; box-shadow: var(--shadow-elevated) !important; font-family: var(--font-body) !important; font-size: 0.8125rem !important; }

    /* Responsive */
    @media (max-width: 768px) {
      .page-bg { padding: 0.75rem 0.75rem 1.5rem; }
      .title-display { font-size: 1.75rem; }
      .grid-2 { grid-template-columns: 1fr; }
      .grid-3 { grid-template-columns: 1fr; }
      .grid-inputs { grid-template-columns: 1fr; gap: 0.75rem; }
      .card { padding: 1.25rem; }
      .hero-metric-value { font-size: 1.625rem; }
      .verdict-recommendation { font-size: 2.25rem; }
      .tab-btn { padding: 0.5rem 1rem; font-size: 0.75rem; }
      .tab-nav { width: calc(100% - 1rem); }
      .cashflow-value { font-size: 1.125rem; }
      input[type="range"]::-webkit-slider-thumb { width: 22px; height: 22px; }
      input[type="range"]::-moz-range-thumb { width: 22px; height: 22px; }
    }

    @media (max-width: 480px) {
      .badge-row { gap: 0.25rem; }
      .badge { font-size: 0.625rem; padding: 0.1875rem 0.5rem; }
      .title-display { font-size: 1.5rem; }
    }

    /* Animations */
    @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .animate-in { animation: fadeUp 0.4s ease-out both; }
    .delay-1 { animation-delay: 0.05s; }
    .delay-2 { animation-delay: 0.1s; }
    .delay-3 { animation-delay: 0.15s; }
    .delay-4 { animation-delay: 0.2s; }
    .delay-5 { animation-delay: 0.25s; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useMemo } = React;
    const { LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer, BarChart, Bar, Cell, AreaChart, Area } = Recharts;

    const fmt = (n) => new Intl.NumberFormat("en-SG", { style: "currency", currency: "SGD", minimumFractionDigits: 0, maximumFractionDigits: 0 }).format(n);
    const fmtPct = (n) => n.toFixed(2) + "%";

    function SliderInput({ label, value, onChange, min, max, step, format = "currency", suffix = "", prefix = "", extra }) {
      const displayVal = format === "currency" ? fmt(value) : format === "percent" ? value + "%" : prefix + value + suffix;
      const minLabel = format === "currency" ? fmt(min) : format === "percent" ? min + "%" : prefix + min + suffix;
      const maxLabel = format === "currency" ? fmt(max) : format === "percent" ? max + "%" : prefix + max + suffix;
      return (
        <div className="slider-group">
          <div className="slider-header">
            <span className="slider-label">{label}</span>
            <span className="slider-value">{displayVal}</span>
          </div>
          <input type="range" min={min} max={max} step={step} value={value}
            onChange={(e) => onChange(Number(e.target.value))} />
          <div className="slider-range">
            <span className="slider-bound">{minLabel}</span>
            <span className="slider-bound">{maxLabel}</span>
          </div>
          {extra && <div className="slider-extra">{extra}</div>}
        </div>
      );
    }

    function MetricRow({ label, value, subtext, positive }) {
      const color = positive === true ? "var(--positive)" : positive === false ? "var(--negative)" : "var(--text-primary)";
      return (
        <div className="metric-row">
          <div>
            <div className="metric-label">{label}</div>
            {subtext && <div className="metric-sub">{subtext}</div>}
          </div>
          <div className="metric-value" style={{ color }}>{value}</div>
        </div>
      );
    }

    function ScenarioToggle({ label, description, active, onChange, impact }) {
      return (
        <div onClick={() => onChange(!active)} className={"scenario-toggle" + (active ? " active" : "")}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: "0.75rem" }}>
            <div style={{ flex: 1 }}>
              <div className="scenario-label">{label}</div>
              <div className="scenario-desc">{description}</div>
            </div>
            <div className={"toggle-track " + (active ? "on" : "off")}>
              <div className={"toggle-thumb " + (active ? "on" : "")} />
            </div>
          </div>
          {active && impact && <div className="scenario-impact">{impact}</div>}
        </div>
      );
    }

    function computeSellScenario({ salePrice, mortgage, cpfPrincipal, cpfInterest, commissionRate }) {
      const commission = salePrice * (commissionRate / 100);
      const cpfRefund = cpfPrincipal + cpfInterest;
      const netCash = salePrice - commission - mortgage - cpfRefund;
      return { salePrice, commission, mortgage, cpfRefund, netCash };
    }

    function computeRentScenario({ propertyValue, mortgage, monthlyPayment, fixedRate, fixedMonths, floatingRate, loanTenureMonths, monthlyMaintenance, monthlyTax, monthlyRent, vacancyMonths, annualAppreciation, years }) {
      let balance = mortgage;
      let cumulativeCashFlow = 0;
      let totalEquityBuilt = 0;
      const monthlyData = [];
      const yearlyData = [];

      for (let m = 1; m <= years * 12; m++) {
        const rate = m <= fixedMonths ? fixedRate : floatingRate;
        const monthlyRate = rate / 100 / 12;
        const remainingMonths = loanTenureMonths - m + 1;

        let payment;
        if (m <= fixedMonths) {
          payment = monthlyPayment;
        } else if (m === fixedMonths + 1) {
          payment = balance * (monthlyRate * Math.pow(1 + monthlyRate, remainingMonths)) / (Math.pow(1 + monthlyRate, remainingMonths) - 1);
        } else {
          payment = monthlyData[m - 2]?.newPayment || monthlyPayment;
        }

        const interestPortion = balance * monthlyRate;
        const principalPortion = payment - interestPortion;
        balance = Math.max(0, balance - principalPortion);
        totalEquityBuilt += principalPortion;

        const isVacant = m <= vacancyMonths;
        const rentIncome = isVacant ? 0 : monthlyRent;
        const netCashFlow = rentIncome - payment - monthlyMaintenance - monthlyTax;
        cumulativeCashFlow += netCashFlow;

        monthlyData.push({ month: m, balance, interestPortion, principalPortion, payment, rentIncome, netCashFlow, cumulativeCashFlow, totalEquityBuilt, newPayment: payment });

        if (m % 12 === 0) {
          const year = m / 12;
          const propertyVal = propertyValue * Math.pow(1 + annualAppreciation / 100, year);
          const appreciation = propertyVal - propertyValue;
          yearlyData.push({ year, balance, cumulativeCashFlow, totalEquityBuilt, propertyValue: propertyVal, appreciation, totalReturn: cumulativeCashFlow + totalEquityBuilt + appreciation, monthlyPayment: payment });
        }
      }
      return { monthlyData, yearlyData };
    }

    const URA_INDEX_DATA = [
      { quarter: "Q1'22", index: 176.6 }, { quarter: "Q2'22", index: 180.4 }, { quarter: "Q3'22", index: 185.5 }, { quarter: "Q4'22", index: 188.6 },
      { quarter: "Q1'23", index: 191.5 }, { quarter: "Q2'23", index: 191.8 }, { quarter: "Q3'23", index: 192.6 }, { quarter: "Q4'23", index: 193.1 },
      { quarter: "Q1'24", index: 194.6 }, { quarter: "Q2'24", index: 196.0 }, { quarter: "Q3'24", index: 198.1 }, { quarter: "Q4'24", index: 199.3 },
      { quarter: "Q1'25", index: 201.5 }, { quarter: "Q2'25", index: 203.2 }, { quarter: "Q3'25", index: 205.6 }, { quarter: "Q4'25", index: 207.0 },
    ];

    const INTEREST_RATE_DATA = [
      { period: "Q1'24", sora3m: 3.65, fixed2y: 3.20 }, { period: "Q2'24", sora3m: 3.60, fixed2y: 3.10 },
      { period: "Q3'24", sora3m: 3.30, fixed2y: 2.85 }, { period: "Q4'24", sora3m: 2.80, fixed2y: 2.50 },
      { period: "Q1'25", sora3m: 2.30, fixed2y: 2.10 }, { period: "Q2'25", sora3m: 1.90, fixed2y: 1.75 },
      { period: "Q3'25", sora3m: 1.50, fixed2y: 1.55 }, { period: "Q4'25", sora3m: 1.25, fixed2y: 1.40 },
      { period: "Q1'26", sora3m: 1.12, fixed2y: 1.35 }, { period: "Q2'26F", sora3m: 1.00, fixed2y: 1.30 },
      { period: "Q3'26F", sora3m: 1.20, fixed2y: 1.40 }, { period: "Q4'26F", sora3m: 1.35, fixed2y: 1.50 },
    ];

    const SUPPLY_PIPELINE = [
      { year: "2024", units: 6200, label: "Actual" }, { year: "2025", units: 7100, label: "Actual" },
      { year: "2026", units: 8400, label: "Expected" }, { year: "2027", units: 9200, label: "Projected" },
      { year: "2028", units: 7500, label: "Projected" },
    ];

    function App() {
      const [activeTab, setActiveTab] = useState("sellvsrent");
      const [salePrice, setSalePrice] = useState(1160000);
      const [expectedRent, setExpectedRent] = useState(3200);
      const [vacancyMonths, setVacancyMonths] = useState(2);
      const [postFixedRate, setPostFixedRate] = useState(2.5);
      const [annualAppreciation, setAnnualAppreciation] = useState(2.5);
      const [analysisYears, setAnalysisYears] = useState(5);
      const [commissionRate, setCommissionRate] = useState(2);
      const [investReturnRate, setInvestReturnRate] = useState(4);
      const [absdReduction, setAbsdReduction] = useState(false);
      const [iranEscalation, setIranEscalation] = useState(false);
      const [rateHike, setRateHike] = useState(false);
      const [supplyGlut, setSupplyGlut] = useState(false);

      const PROPERTY = {
        type: "1-Bedroom + Study", sqft: 527, floor: 9, tenure: "Freehold",
        district: "D15 (Marine Parade / East Coast)", mortgage: 701540,
        cpfPrincipal: 174348.84, cpfInterest: 23281.82, monthlyPayment: 2799.35,
        fixedRate: 1.55, fixedMonths: 24, loanTenureMonths: 303,
        monthlyMaintenance: 375, monthlyTax: 309.60, currentRent: 3600, personalRent: 2900,
      };

      const sellResult = useMemo(() => computeSellScenario({
        salePrice, mortgage: PROPERTY.mortgage,
        cpfPrincipal: PROPERTY.cpfPrincipal, cpfInterest: PROPERTY.cpfInterest, commissionRate
      }), [salePrice, commissionRate]);

      const rentResult = useMemo(() => computeRentScenario({
        propertyValue: salePrice, mortgage: PROPERTY.mortgage, monthlyPayment: PROPERTY.monthlyPayment,
        fixedRate: PROPERTY.fixedRate, fixedMonths: PROPERTY.fixedMonths, floatingRate: postFixedRate,
        loanTenureMonths: PROPERTY.loanTenureMonths, monthlyMaintenance: PROPERTY.monthlyMaintenance,
        monthlyTax: PROPERTY.monthlyTax, monthlyRent: expectedRent, vacancyMonths, annualAppreciation, years: analysisYears,
      }), [salePrice, expectedRent, vacancyMonths, postFixedRate, annualAppreciation, analysisYears]);

      const investmentGrowth = useMemo(() => {
        const netCash = sellResult.netCash;
        const data = [];
        for (let y = 1; y <= analysisYears; y++) {
          const invested = netCash * Math.pow(1 + investReturnRate / 100, y);
          const gains = invested - netCash;
          data.push({ year: y, invested, gains });
        }
        return data;
      }, [sellResult.netCash, investReturnRate, analysisYears]);

      const comparisonData = useMemo(() => {
        const netCash = sellResult.netCash;
        return rentResult.yearlyData.map((ry) => {
          const sellInvested = netCash * Math.pow(1 + investReturnRate / 100, ry.year);
          const sellTotal = sellInvested - netCash;
          return {
            year: "Year " + ry.year,
            "Sell: Investment Gains": Math.round(sellTotal),
            "Rent: Total Return": Math.round(ry.totalReturn),
          };
        });
      }, [rentResult, sellResult, investReturnRate]);

      const scenarioAppreciation = useMemo(() => {
        let adj = annualAppreciation;
        if (absdReduction) adj += 1.5;
        if (iranEscalation) adj -= 1.0;
        if (rateHike) adj -= 1.5;
        if (supplyGlut) adj -= 1.0;
        return adj;
      }, [annualAppreciation, absdReduction, iranEscalation, rateHike, supplyGlut]);

      const monthlyCashFlowExpected = expectedRent - PROPERTY.monthlyPayment - PROPERTY.monthlyMaintenance - PROPERTY.monthlyTax;
      const monthlyInterest = PROPERTY.mortgage * (PROPERTY.fixedRate / 100 / 12);
      const monthlyPrincipal = PROPERTY.monthlyPayment - monthlyInterest;
      const psf = salePrice / PROPERTY.sqft;
      const grossYield = (expectedRent * 12) / salePrice * 100;

      const verdict = useMemo(() => {
        const lastYear = rentResult.yearlyData[rentResult.yearlyData.length - 1];
        const netCash = sellResult.netCash;
        const sellGains = netCash * Math.pow(1 + investReturnRate / 100, analysisYears) - netCash;
        const rentReturn = lastYear?.totalReturn || 0;
        if (sellGains > rentReturn + 20000) {
          return { recommendation: "SELL", color: "sell", reason: "Over " + analysisYears + " years, selling and investing the proceeds is projected to outperform renting by " + fmt(sellGains - rentReturn) + ". With negative monthly cash flow, selling frees up capital and eliminates risk." };
        } else if (rentReturn > sellGains + 20000) {
          return { recommendation: "RENT", color: "rent", reason: "Over " + analysisYears + " years, holding and renting is projected to outperform selling by " + fmt(rentReturn - sellGains) + ", mainly driven by property appreciation and equity buildup." };
        } else {
          return { recommendation: "CLOSE CALL", color: "close", reason: "The difference between selling and renting is within " + fmt(Math.abs(sellGains - rentReturn)) + " over " + analysisYears + " years. Your decision should weigh cash flow needs, risk tolerance, and market outlook." };
        }
      }, [rentResult, sellResult, investReturnRate, analysisYears]);

      const verdictAccent = verdict.color === "sell" ? "var(--sell-color)" : verdict.color === "rent" ? "var(--accent)" : "#fbbf24";

      const chartColors = {
        grid: "rgba(255,255,255,0.06)",
        axis: "var(--text-muted)",
        sell: "#f97316",
        rent: "#2dd4bf",
        line1: "#2dd4bf",
        line2: "#f97316",
        area: "#2dd4bf",
      };

      const customTooltipStyle = {
        backgroundColor: 'rgba(15, 23, 42, 0.95)',
        border: '1px solid rgba(255,255,255,0.1)',
        borderRadius: '8px',
        padding: '8px 12px',
        backdropFilter: 'blur(8px)',
      };

      const CustomTooltip = ({ active, payload, label }) => {
        if (!active || !payload) return null;
        return (
          <div style={customTooltipStyle}>
            <div style={{ fontSize: '0.6875rem', color: 'var(--text-muted)', marginBottom: '4px', fontWeight: 600 }}>{label}</div>
            {payload.map((p, i) => (
              <div key={i} style={{ fontSize: '0.8125rem', color: p.color, fontWeight: 500, padding: '1px 0' }}>
                {p.name}: {typeof p.value === 'number' && p.value > 100 ? fmt(p.value) : p.value}
              </div>
            ))}
          </div>
        );
      };

      return (
        <div className="page-bg">
          <div className="container">
            {/* Header */}
            <div style={{ textAlign: "center", marginBottom: "1.75rem", paddingTop: "1rem" }} className="animate-in">
              <h1 className="title-display">8M Residences</h1>
              <p className="subtitle" style={{ marginTop: "0.25rem" }}>Sell or Rent Out — Decision Analysis</p>
              <div className="badge-row">
                <span className="badge">{PROPERTY.type}</span>
                <span className="badge">{PROPERTY.sqft} sqft</span>
                <span className="badge">Floor {PROPERTY.floor}</span>
                <span className="badge badge-accent">{PROPERTY.tenure}</span>
                <span className="badge">{PROPERTY.district}</span>
              </div>
            </div>

            {/* Tabs */}
            <div className="tab-nav animate-in delay-1">
              <button className={"tab-btn" + (activeTab === "sellvsrent" ? " active" : "")} onClick={() => setActiveTab("sellvsrent")}>Calculator</button>
              <button className={"tab-btn" + (activeTab === "market" ? " active" : "")} onClick={() => setActiveTab("market")}>Market Data</button>
            </div>

            {activeTab === "sellvsrent" && (
              <div>
                {/* Verdict */}
                <div className={"verdict-card " + verdict.color + " animate-in delay-2"}>
                  <div className="verdict-label" style={{ color: verdictAccent }}>Projected Outcome</div>
                  <div className="verdict-recommendation" style={{ color: verdictAccent }}>{verdict.recommendation}</div>
                  <p className="verdict-reason">{verdict.reason}</p>
                  <p className="verdict-disclaimer">Not financial advice. Adjust the inputs below to test different scenarios.</p>
                </div>

                {/* Inputs */}
                <div className="card animate-in delay-3" style={{ marginBottom: "1.5rem" }}>
                  <div className="card-title">Adjust Your Assumptions</div>
                  <div className="grid-inputs">
                    <SliderInput label="Sale Price" value={salePrice} onChange={setSalePrice} min={1100000} max={1250000} step={10000} format="currency" extra={fmt(psf) + " PSF"} />
                    <SliderInput label="Expected Monthly Rent" value={expectedRent} onChange={setExpectedRent} min={2800} max={4000} step={100} format="currency" extra={"Yield: " + fmtPct(grossYield)} />
                    <SliderInput label="Vacancy (months)" value={vacancyMonths} onChange={setVacancyMonths} min={0} max={6} step={1} format="number" suffix=" months" />
                    <SliderInput label="Post-Fixed Interest Rate" value={postFixedRate} onChange={setPostFixedRate} min={1.5} max={4.5} step={0.1} format="percent" />
                    <SliderInput label="Annual Appreciation" value={annualAppreciation} onChange={setAnnualAppreciation} min={-2} max={6} step={0.5} format="percent" />
                    <SliderInput label="Analysis Period" value={analysisYears} onChange={setAnalysisYears} min={1} max={10} step={1} format="number" suffix=" years" />
                    <SliderInput label="Agent Commission" value={commissionRate} onChange={setCommissionRate} min={1} max={3} step={0.25} format="percent" />
                    <SliderInput label="Investment Return (if sell)" value={investReturnRate} onChange={setInvestReturnRate} min={1} max={8} step={0.5} format="percent" />
                  </div>
                </div>

                {/* Sell vs Rent side by side */}
                <div className="grid-2" style={{ marginBottom: "1.5rem" }}>
                  <div className="card card-top-sell animate-in delay-3">
                    <div className="card-title">Sell Scenario</div>
                    <div className="hero-metric">
                      <div className="hero-metric-label">Net Cash in Hand</div>
                      <div className="hero-metric-value" style={{ color: "var(--sell-color)" }}>{fmt(sellResult.netCash)}</div>
                      <div className="hero-metric-sub">After mortgage, CPF refund & commission</div>
                    </div>
                    <MetricRow label="Sale Price" value={fmt(sellResult.salePrice)} />
                    <MetricRow label={"Agent Commission (" + commissionRate + "%)"} value={"-" + fmt(sellResult.commission)} positive={false} />
                    <MetricRow label="Outstanding Mortgage" value={"-" + fmt(sellResult.mortgage)} positive={false} />
                    <MetricRow label="CPF Refund" subtext={"$" + (PROPERTY.cpfPrincipal/1000).toFixed(1) + "k principal + $" + (PROPERTY.cpfInterest/1000).toFixed(1) + "k accrued interest"} value={"-" + fmt(sellResult.cpfRefund)} positive={false} />
                    <div className="divider-sell">
                      <MetricRow label="Investable Cash" value={fmt(sellResult.netCash)} positive={true} />
                    </div>
                    <div className="projection-box">
                      <div className="projection-title">If Invested at {investReturnRate}% p.a.</div>
                      {investmentGrowth.map(d => (
                        <div key={d.year} className="projection-row">
                          <span className="projection-year">Year {d.year}</span>
                          <span className="projection-val">{fmt(d.invested)} <span style={{ color: "var(--positive)", fontWeight: 500, fontSize: "0.75rem" }}>(+{fmt(d.gains)})</span></span>
                        </div>
                      ))}
                    </div>
                  </div>

                  <div className="card card-top-accent animate-in delay-4">
                    <div className="card-title">Rent Out Scenario</div>
                    <div className="hero-metric">
                      <div className="hero-metric-label">Monthly Cash Flow</div>
                      <div className="hero-metric-value" style={{ color: monthlyCashFlowExpected >= 0 ? "var(--positive)" : "var(--negative)" }}>{fmt(monthlyCashFlowExpected)}/mo</div>
                      <div className="hero-metric-sub">At {fmt(expectedRent)} rent · {monthlyCashFlowExpected >= 0 ? "Cash flow positive" : "Cash flow negative"}</div>
                    </div>
                    <MetricRow label="Monthly Rent Income" value={fmt(expectedRent)} positive={true} />
                    <MetricRow label="Mortgage Repayment" subtext={fmt(monthlyInterest) + " interest + " + fmt(monthlyPrincipal) + " principal"} value={"-" + fmt(PROPERTY.monthlyPayment)} positive={false} />
                    <MetricRow label="Condo Maintenance" value={"-" + fmt(PROPERTY.monthlyMaintenance)} positive={false} />
                    <MetricRow label="Property Tax" value={"-" + fmt(PROPERTY.monthlyTax)} positive={false} />
                    <div className="divider-accent">
                      <MetricRow label="Net Cash Flow" value={fmt(monthlyCashFlowExpected) + "/mo"} positive={monthlyCashFlowExpected >= 0} />
                      <MetricRow label="Equity Buildup" subtext="Principal repayment builds ownership" value={"+" + fmt(monthlyPrincipal) + "/mo"} positive={true} />
                      <MetricRow label="Gross Rental Yield" value={fmtPct(grossYield)} />
                    </div>
                    <div className="projection-box">
                      <div className="projection-title">Projected Over Time ({annualAppreciation}% appreciation)</div>
                      {rentResult.yearlyData.map(d => (
                        <div key={d.year} className="projection-row">
                          <span className="projection-year">Year {d.year}</span>
                          <span className="projection-val">Total: <span style={{ color: d.totalReturn >= 0 ? "var(--positive)" : "var(--negative)" }}>{fmt(d.totalReturn)}</span></span>
                        </div>
                      ))}
                      <div style={{ fontSize: "0.6875rem", color: "var(--text-muted)", marginTop: "0.5rem" }}>Total = Cash Flow + Equity + Appreciation</div>
                    </div>
                  </div>
                </div>

                {/* Comparison Chart */}
                <div className="card card-dark animate-in delay-4" style={{ marginBottom: "1.5rem" }}>
                  <div className="card-title">Cumulative Returns — {analysisYears} Year Comparison</div>
                  <ResponsiveContainer width="100%" height={320}>
                    <BarChart data={comparisonData} margin={{ top: 10, right: 16, left: 16, bottom: 5 }}>
                      <CartesianGrid strokeDasharray="3 3" stroke={chartColors.grid} />
                      <XAxis dataKey="year" tick={{ fontSize: 11, fill: '#94a3b8' }} axisLine={{ stroke: 'rgba(255,255,255,0.08)' }} tickLine={false} />
                      <YAxis tickFormatter={(v) => (v / 1000).toFixed(0) + "k"} tick={{ fontSize: 11, fill: '#94a3b8' }} axisLine={false} tickLine={false} />
                      <Tooltip content={<CustomTooltip />} />
                      <Legend wrapperStyle={{ fontSize: '0.75rem', color: '#94a3b8' }} />
                      <Bar dataKey="Sell: Investment Gains" fill={chartColors.sell} radius={[4, 4, 0, 0]} />
                      <Bar dataKey="Rent: Total Return" fill={chartColors.rent} radius={[4, 4, 0, 0]} />
                    </BarChart>
                  </ResponsiveContainer>
                </div>

                {/* Risks */}
                <div className="grid-2" style={{ marginBottom: "1.5rem" }}>
                  <div className="card animate-in delay-4">
                    <div className="card-title" style={{ color: "var(--sell-color)" }}>Risks if You Sell</div>
                    <div className="risk-item"><div className="risk-icon risk-icon-sell">!</div><span>Miss out on freehold appreciation in a prime D15 location near new Thomson-East Coast MRT Line</span></div>
                    <div className="risk-item"><div className="risk-icon risk-icon-sell">!</div><span>Locked your refinanced rate at 1.55% — below current market of 1.30-1.45%. Lose this advantage on sale</span></div>
                    <div className="risk-item"><div className="risk-icon risk-icon-sell">!</div><span>15-month cooling period before you can buy a resale HDB</span></div>
                    <div className="risk-item"><div className="risk-icon risk-icon-sell">!</div><span>20% ABSD if you buy a 2nd private property in future</span></div>
                  </div>
                  <div className="card animate-in delay-5">
                    <div className="card-title" style={{ color: "var(--accent)" }}>Risks if You Rent Out</div>
                    <div className="risk-item"><div className="risk-icon risk-icon-rent">!</div><span>Negative cash flow of {fmt(monthlyCashFlowExpected)}/mo at {fmt(expectedRent)} rent — you're subsidising the property</span></div>
                    <div className="risk-item"><div className="risk-icon risk-icon-rent">!</div><span>New competing condo nearby may push rents lower or extend vacancy</span></div>
                    <div className="risk-item"><div className="risk-icon risk-icon-rent">!</div><span>After 2-year fixed period, floating rates could rise to {postFixedRate}%+, increasing monthly payments</span></div>
                    <div className="risk-item"><div className="risk-icon risk-icon-rent">!</div><span>You're also paying $2,900/mo rent on your own home — total housing cost is high</span></div>
                  </div>
                </div>

                {/* Cash Flow Reality Check */}
                <div className="card animate-in delay-5" style={{ marginBottom: "1.5rem" }}>
                  <div className="card-title">Monthly Cash Flow Reality Check</div>
                  <div className="grid-3">
                    <div className="cashflow-card">
                      <div className="cashflow-label">If You Keep & Rent</div>
                      <div className="cashflow-value" style={{ color: "var(--text-primary)" }}>{fmt(monthlyCashFlowExpected - PROPERTY.personalRent)}/mo</div>
                      <div className="cashflow-sub">Net of property cash flow + your own rent ($2,900)</div>
                    </div>
                    <div className="cashflow-card">
                      <div className="cashflow-label">If You Sell</div>
                      <div className="cashflow-value" style={{ color: "var(--text-primary)" }}>{fmt(-PROPERTY.personalRent)}/mo</div>
                      <div className="cashflow-sub">Only paying your own rent ($2,900), no property costs</div>
                    </div>
                    <div className="cashflow-card">
                      <div className="cashflow-label">Monthly Difference</div>
                      <div className="cashflow-value" style={{ color: monthlyCashFlowExpected >= 0 ? "var(--positive)" : "var(--negative)" }}>{fmt(Math.abs(monthlyCashFlowExpected))}/mo</div>
                      <div className="cashflow-sub">{monthlyCashFlowExpected >= 0 ? "Better off keeping (rental profit)" : "Better off selling (stop bleeding)"}</div>
                    </div>
                  </div>
                </div>
              </div>
            )}

            {activeTab === "market" && (
              <div>
                {/* Scenario Toggles */}
                <div className="card card-dark animate-in delay-2" style={{ marginBottom: "1.5rem" }}>
                  <div className="card-title">Scenario Toggles — What Could Change?</div>
                  <div className="chart-subtitle">Toggle these scenarios to see how they might affect the market outlook and your decision.</div>
                  <div className="grid-2" style={{ gap: "0.75rem" }}>
                    <ScenarioToggle label="ABSD Reduction for Citizens" description="Government lowers ABSD from 20% to 12-15% for 2nd property" active={absdReduction} onChange={setAbsdReduction} impact="Would boost demand from Singaporean upgraders/investors. Likely +1.5% to property prices. More buyers in the market = easier exit if you hold." />
                    <ScenarioToggle label="Iran War Escalation" description="Prolonged conflict, oil above $120/bbl, inflation spike" active={iranEscalation} onChange={setIranEscalation} impact="Oil price spike → higher inflation → MAS tightens policy → delayed rate cuts. Could dampen sentiment and slow price growth by ~1%." />
                    <ScenarioToggle label="Interest Rate Reversal" description="SORA climbs back above 2.5% due to sticky inflation" active={rateHike} onChange={setRateHike} impact="Higher rates = higher mortgage costs post-fixed period + lower affordability = dampened demand. Could reduce price growth by ~1.5%." />
                    <ScenarioToggle label="Supply Glut from New Launches" description="8,400+ new units in 2026 + competing nearby condo flood market" active={supplyGlut} onChange={setSupplyGlut} impact="Excess supply pressures both rents and prices. D15 particularly affected with new nearby condo. Could reduce rents by $200-400/mo and slow appreciation by ~1%." />
                  </div>
                  <div className="appreciation-box">
                    <span className="appreciation-label">Adjusted Appreciation Forecast:</span>
                    <span style={{ color: scenarioAppreciation >= 0 ? "var(--positive)" : "var(--negative)", fontWeight: 700, fontSize: "1rem" }}>{scenarioAppreciation >= 0 ? "+" : ""}{scenarioAppreciation.toFixed(1)}% p.a.</span>
                    <span style={{ color: "var(--text-muted)", fontSize: "0.8125rem" }}>(Base: {annualAppreciation}%)</span>
                  </div>
                </div>

                {/* URA Price Index */}
                <div className="card card-dark animate-in delay-3" style={{ marginBottom: "1.5rem" }}>
                  <div className="card-title">URA Private Residential Price Index (2022–2025)</div>
                  <div className="chart-subtitle">Full-year 2025 growth slowed to 3.4%. Analysts forecast 2-5% growth for 2026.</div>
                  <ResponsiveContainer width="100%" height={280}>
                    <AreaChart data={URA_INDEX_DATA} margin={{ top: 10, right: 16, left: 16, bottom: 5 }}>
                      <defs>
                        <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
                          <stop offset="0%" stopColor="#2dd4bf" stopOpacity={0.25} />
                          <stop offset="100%" stopColor="#2dd4bf" stopOpacity={0.02} />
                        </linearGradient>
                      </defs>
                      <CartesianGrid strokeDasharray="3 3" stroke={chartColors.grid} />
                      <XAxis dataKey="quarter" tick={{ fontSize: 11, fill: '#94a3b8' }} interval={1} axisLine={{ stroke: 'rgba(255,255,255,0.08)' }} tickLine={false} />
                      <YAxis domain={[170, 215]} tick={{ fontSize: 11, fill: '#94a3b8' }} axisLine={false} tickLine={false} />
                      <Tooltip content={<CustomTooltip />} />
                      <Area type="monotone" dataKey="index" stroke="#2dd4bf" fill="url(#areaGrad)" strokeWidth={2.5} name="Price Index" dot={{ r: 2.5, fill: '#2dd4bf', strokeWidth: 0 }} activeDot={{ r: 5, fill: '#2dd4bf', stroke: '#0f172a', strokeWidth: 2 }} />
                    </AreaChart>
                  </ResponsiveContainer>
                </div>

                {/* Interest Rate Trends */}
                <div className="card card-dark animate-in delay-3" style={{ marginBottom: "1.5rem" }}>
                  <div className="card-title">Interest Rate Trends — SORA & Fixed Rates</div>
                  <div className="chart-subtitle">3M SORA at 1.12% (Mar'26). Forecast to bottom near 1% in Q2'26, then rebound to ~1.35% by year-end.</div>
                  <ResponsiveContainer width="100%" height={280}>
                    <LineChart data={INTEREST_RATE_DATA} margin={{ top: 10, right: 16, left: 16, bottom: 5 }}>
                      <CartesianGrid strokeDasharray="3 3" stroke={chartColors.grid} />
                      <XAxis dataKey="period" tick={{ fontSize: 11, fill: '#94a3b8' }} axisLine={{ stroke: 'rgba(255,255,255,0.08)' }} tickLine={false} />
                      <YAxis domain={[0, 4.5]} tick={{ fontSize: 11, fill: '#94a3b8' }} tickFormatter={v => v + "%"} axisLine={false} tickLine={false} />
                      <Tooltip content={<CustomTooltip />} />
                      <Legend wrapperStyle={{ fontSize: '0.75rem', color: '#94a3b8' }} />
                      <Line type="monotone" dataKey="sora3m" stroke="#2dd4bf" strokeWidth={2.5} name="3M SORA" dot={{ r: 3, fill: '#2dd4bf', strokeWidth: 0 }} activeDot={{ r: 5, fill: '#2dd4bf', stroke: '#0f172a', strokeWidth: 2 }} />
                      <Line type="monotone" dataKey="fixed2y" stroke="#f97316" strokeWidth={2} name="2Y Fixed" dot={{ r: 3, fill: '#f97316', strokeWidth: 0 }} strokeDasharray="6 4" activeDot={{ r: 5, fill: '#f97316', stroke: '#0f172a', strokeWidth: 2 }} />
                    </LineChart>
                  </ResponsiveContainer>
                </div>

                {/* Supply Pipeline */}
                <div className="card card-dark animate-in delay-4" style={{ marginBottom: "1.5rem" }}>
                  <div className="card-title">Private Condo Supply Pipeline</div>
                  <div className="chart-subtitle">~8,400 units expected in 2026 (65% in OCR). Heavy supply in 2026-2027 may moderate price growth.</div>
                  <ResponsiveContainer width="100%" height={250}>
                    <BarChart data={SUPPLY_PIPELINE} margin={{ top: 10, right: 16, left: 16, bottom: 5 }}>
                      <CartesianGrid strokeDasharray="3 3" stroke={chartColors.grid} />
                      <XAxis dataKey="year" tick={{ fontSize: 12, fill: '#94a3b8' }} axisLine={{ stroke: 'rgba(255,255,255,0.08)' }} tickLine={false} />
                      <YAxis tick={{ fontSize: 12, fill: '#94a3b8' }} axisLine={false} tickLine={false} />
                      <Tooltip content={<CustomTooltip />} />
                      <Bar dataKey="units" name="Units" radius={[6, 6, 0, 0]}>
                        {SUPPLY_PIPELINE.map((entry, i) => (
                          <Cell key={i} fill={entry.label === "Actual" ? "#2dd4bf" : entry.label === "Expected" ? "#f97316" : "#475569"} />
                        ))}
                      </Bar>
                    </BarChart>
                  </ResponsiveContainer>
                  <div className="chart-legend">
                    <span className="legend-item"><span className="legend-dot" style={{ background: "#2dd4bf" }} /> Actual</span>
                    <span className="legend-item"><span className="legend-dot" style={{ background: "#f97316" }} /> Expected</span>
                    <span className="legend-item"><span className="legend-dot" style={{ background: "#475569" }} /> Projected</span>
                  </div>
                </div>

                {/* ABSD Table */}
                <div className="card card-dark animate-in delay-4" style={{ marginBottom: "1.5rem" }}>
                  <div className="card-title">ABSD Rates (Current, Since Apr 2023)</div>
                  <div style={{ overflowX: "auto" }}>
                    <table className="data-table">
                      <thead>
                        <tr>
                          <th>Profile</th>
                          <th>1st Property</th>
                          <th>2nd Property</th>
                          <th>3rd+</th>
                        </tr>
                      </thead>
                      <tbody>
                        <tr className="highlight-row">
                          <td style={{ fontWeight: 600 }}>Singapore Citizen</td>
                          <td>0%</td>
                          <td style={{ fontWeight: 700, color: "var(--negative)" }}>20%</td>
                          <td style={{ fontWeight: 700, color: "var(--negative)" }}>30%</td>
                        </tr>
                        <tr>
                          <td style={{ fontWeight: 600 }}>Permanent Resident</td>
                          <td>5%</td>
                          <td>30%</td>
                          <td>35%</td>
                        </tr>
                        <tr>
                          <td style={{ fontWeight: 600 }}>Foreigner</td>
                          <td style={{ fontWeight: 700, color: "var(--negative)" }}>60%</td>
                          <td style={{ fontWeight: 700, color: "var(--negative)" }}>60%</td>
                          <td style={{ fontWeight: 700, color: "var(--negative)" }}>60%</td>
                        </tr>
                        <tr>
                          <td style={{ fontWeight: 600 }}>Entity / Trust</td>
                          <td>65%</td>
                          <td>65%</td>
                          <td>65%</td>
                        </tr>
                      </tbody>
                    </table>
                  </div>
                  <div style={{ marginTop: "0.75rem", fontSize: "0.75rem", color: "var(--text-muted)", lineHeight: 1.6 }}>
                    <strong style={{ color: "var(--text-light)" }}>Note:</strong> ABSD does not apply to commercial properties. No changes announced for 2026. If you sell and later buy a 2nd residential property, you'd face 20% ABSD as a Singapore citizen.
                  </div>
                </div>

                {/* Market Assessment */}
                <div className="card card-dark animate-in delay-5" style={{ marginBottom: "1.5rem" }}>
                  <div className="card-title">Market Assessment Summary</div>
                  <div style={{ display: "flex", flexDirection: "column", gap: "0.75rem" }}>
                    <div className="assessment-block">
                      <div className="assessment-title">Is the market overpriced or underpriced?</div>
                      <p className="assessment-text">Singapore private residential prices have risen steadily but growth is decelerating (3.4% in 2025, slowest since 2020). With analysts projecting 2-5% growth in 2026 and falling interest rates supporting affordability, the market appears <strong>fairly valued to slightly stretched</strong> — not a bubble, but not a bargain either. Freehold D15 properties near new MRT lines tend to hold value well.</p>
                    </div>
                    <div className="assessment-block">
                      <div className="assessment-title">Iran War Impact</div>
                      <p className="assessment-text">The conflict caused oil to spike above $110/bbl, raising inflation concerns. For Singapore property, the main transmission is through delayed rate cuts and dampened sentiment. Historically, geopolitical shocks create short-term hesitation but not structural collapses. The bigger risk is if oil stays elevated long enough to reverse the current rate-cutting cycle.</p>
                    </div>
                    <div className="assessment-block">
                      <div className="assessment-title">ABSD Outlook</div>
                      <p className="assessment-text">No changes announced for 2026. A reduction would be bullish for property demand. Some analysts speculate the government may revisit rates if transaction volumes drop significantly, but nothing is imminent. ABSD does not apply to commercial properties.</p>
                    </div>
                    <div className="assessment-block">
                      <div className="assessment-title">Rental Market Outlook</div>
                      <p className="assessment-text">Rents are flat to slightly up (0-3% forecast for 2026). Vacancy fell to 6.0% in Q4'25. However, heavy new supply from nearby launches could specifically pressure D15 rents. Your current $3,600/mo rent is likely above what a new tenant would pay given the competition.</p>
                    </div>
                  </div>
                </div>
              </div>
            )}

            {/* Footer */}
            <div className="footer">
              <div className="footer-brand">Powered by <a href="https://vandaai.com" target="_blank" rel="noopener noreferrer">Vanda AI</a></div>
              <div className="footer-disclaimer">
                8M Residences Decision Analysis · March 2026<br />

                Consult a licensed financial advisor before making investment decisions.
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById("root"));
